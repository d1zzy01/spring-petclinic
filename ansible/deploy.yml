---
- name: Deploy spring-petclinic to production
  hosts: production
  become: true

  vars:
    app_port: 8080
    app_dir: /opt/petclinic

  tasks:

    - name: Ensure Java 17 is installed
      apt:
        name: openjdk-17-jre-headless
        state: present
        update_cache: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Kill existing app if running
      shell: pkill -f 'petclinic.jar' || true
      ignore_errors: yes

    - name: Copy new JAR to production server
      copy:
        src: "{{ jar_path }}"
        dest: "{{ app_dir }}/petclinic.jar"
        mode: '0644'

    - name: Start application in background
      shell: |
        nohup java -jar {{ app_dir }}/petclinic.jar \
          --server.port={{ app_port }} \
          > {{ app_dir }}/petclinic.log 2>&1 &
        echo $! > {{ app_dir }}/petclinic.pid
      args:
        executable: /bin/bash

    - name: Wait for app to respond
      uri:
        url: "http://localhost:{{ app_port }}"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 15
      delay: 10

    - name: Confirm deployment
      debug:
        msg: "spring-petclinic is live at http://{{ ansible_host }}:{{ app_port }}"